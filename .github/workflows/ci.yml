name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run linter
        run: pnpm run validate

      - name: Run tests
        run: pnpm run test:coverage

      - name: Build
        run: pnpm run bundle

      - name: Verify dist is up-to-date
        run: |
          if [ -n "$(git status --porcelain dist/)" ]; then
            echo "::error::dist/ directory is out of date. Please run 'pnpm run bundle' and commit the changes."
            git diff dist/
            exit 1
          fi
          echo "✓ dist/ directory is up-to-date"
